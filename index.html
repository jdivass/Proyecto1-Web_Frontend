<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Tracker</title>
    <link rel="stylesheet" href ="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to your series tracker</h1>
        <button type="button" id="add_series">Add Serie</button>
    </header>
    <input type="text" id="search" placeholder="Search your favorite series..." >
    <label for="atributes">Choose an order value:</label>
    <select name="atributes" id="atributes">
        <option value="title">Title</option>
        <option value="id">ID</option>
        <option value="created_at">Date Added</option>
        <option value="total_seasons">Total Seasons</option>
        <option value="total_episodes">Total Episodes</option>
    </select>

    <label for="order">Ascendent or descendent:</label>
    <select name="order" id="order">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
    </select>

    <section id="series_container"></section>

    <button type="button" id="prev_page">Previous Page</button>
    <span id="page_info"></span>
    <button type="button" id="next_page">Next Page</button>

    <script src="api.js"></script>
    <script src="index.js"></script>
</body>
</html>
