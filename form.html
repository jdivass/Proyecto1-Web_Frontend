<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="form_title">Add Serie</h1>
        <a href="./index.html">Back to series tracker</a>
    </header>

    <main>
        <input type="text" id="title" placeholder="Title">
        <input type="text" id="genre" placeholder="Genre">
        <textarea id="description" placeholder="Description"></textarea>
        <input type="text" id="platform" placeholder="Platform">
        
        <select id="status">
            <option value="0">Not started</option>
            <option value="1">In progress</option>
            <option value="2">Finished</option>
        </select>

        <input type="number" id="total_seasons" placeholder="Total Seasons" min="1">
        <input type="number" id="total_episodes" placeholder="Total Episodes" min="1">
        <input type="number" id="current_season" placeholder="Current Season" min="0">
        <input type="number" id="current_episode" placeholder="Current Episode" min="0">

        <input type="file" id="image" accept="image/*">
        <img id="image_preview" alt="Image preview" style="display:none; width:200px; height:200px;">

        <button type="button" id="submit_btn">Save</button>
        <button type="button" id="cancel_btn">Cancel</button>
    </main>

    <script src="api.js"></script>
    <script src="form.js"></script>
</body>
</html>
